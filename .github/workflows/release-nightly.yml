name: release-nightly

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-nightly
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check app bundle
        run: pnpm run check

      - name: Build Windows package
        run: pnpm run dist:win

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: pickcat-reborn-windows
          path: release/windows/*
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-35 build-tools;35.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check app bundle
        run: pnpm run check

      - name: Sync Android assets
        run: pnpm run android:sync

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: pickcat-reborn-android
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  publish-nightly:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download workflow artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="nightly"
          title="Nightly Build"
          notes=$(cat <<EOF
          Auto-built from commit $GITHUB_SHA
          Branch: $GITHUB_REF_NAME
          Workflow: $GITHUB_WORKFLOW
          EOF
          )

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/$tag" --force

          shopt -s nullglob
          files=(release-assets/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes "$notes" --prerelease
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$title" --notes "$notes" --prerelease
          fi
