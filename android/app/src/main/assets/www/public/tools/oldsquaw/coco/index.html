<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oldsquaw-CoCoPro Loader</title>

<script src="static/ccp/origin.js"></script>
<script>
// 获取当前URL的查询参数
function getQueryParam(param) {
  const queryString = window.location.search;
  const urlParams = new URLSearchParams(queryString);
  return urlParams.get(param);
}

// 重定向函数
function redirectTo(url) {
  window.location.href = url;
}

function handleRedirect() {
  const type = getQueryParam('type');
  if (!type) {
    // 如果没有type参数，则重定向到编辑器页面
    redirectTo(ccporigin+'/editor.html');
  } else if (type === 'editor') {
    // 如果type参数为editor，则重定向到编辑器页面
    redirectTo(ccporigin+'/editor.html');
  } else if (type === 'player') {
    // 如果type参数为player，获取id参数值，并重定向到播放器页面
    const id = getQueryParam('id'), channel = getQueryParam('channel');
    if (channel == null) {
      channel = "h5"
    }

    if (id) {
      redirectTo(`${ccporigin}/editor/player/?id=${id}&channel=${channel}`);
      //redirectTo(`https://coco.codemao.cn/http-widget-proxy/${ccporigin}/editor/player/?id=${id}&channel=${channel}`);
    } else {
      // 如果type参数为editor，则重定向到编辑器页面
      redirectTo(ccporigin+'/editor.html');
    }
  }
}

// 页面加载完毕后执行重定向逻辑
document.addEventListener('DOMContentLoaded', handleRedirect);
</script>
</head>
<body>

<div class="terminal-loader">
  <div class="terminal-header">
    <div class="terminal-title">Status</div>
    <div class="terminal-controls">
      <div class="control close"></div>
      <div class="control minimize"></div>
      <div class="control maximize"></div>
    </div>
  </div>
  <div class="content">
    <div class="text">Loading...</div>
  </div>
</div>
<style>
    /* From Uiverse.io by vikas7754 */
@keyframes blinkCursor {
  50% {
    border-right-color: transparent;
  }
}

@keyframes typeAndDelete {
  0%,
  10% {
    width: 0;
  }

  45%,
  55% {
    width: 5em;
  }

  90%,
  100% {
    width: 0;
  }
}

.terminal-loader {
  width: 100%;
  max-width: 400px;
  height: 200px;
  background: #1c1c1c;
  border: 1px solid #ffffff3e;
  border-radius: 10px;
  overflow: hidden;
  margin: 20px;
  box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
}

.terminal-header {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: #343434;
  padding: 6px;
}

.terminal-controls {
  position: absolute;
  left: 10px;
  display: flex;
  gap: 7px;
}

.control {
  display: inline-block;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  background-color: #777;
}

.control.close {
  background-color: #e33;
}

.control.minimize {
  background-color: #ee0;
}

.control.maximize {
  background-color: #0b0;
}

.terminal-title {
  color: #eeeeeec1;
}

.content {
  padding: 10px;
}
.text {
  display: inline-block;
  white-space: nowrap;
  overflow: hidden;
  border-right: 2px solid green;
  animation: typeAndDelete 4s steps(11) infinite,
    blinkCursor 0.5s step-end infinite alternate;
  color: rgb(0, 196, 0);
  font-weight: 600;
}

</style>
</body>
</html>
