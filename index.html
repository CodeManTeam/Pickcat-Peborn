<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1677ff" />
    <title>Pickcat Reborn</title>
    <link rel="icon" href="public/assets/pickcat/ic_home_logo.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="phone-shell">
      <section class="splash" data-splash>
        <img src="public/assets/bg_launch.webp" alt="PICKCAT" />
      </section>

      <main class="app" aria-live="polite">
        <header class="topbar" data-topbar>
          <h1 class="brand" data-title><img src="public/assets/pickcat/ic_home_logo.png" alt="PICKCAT" /></h1>
          <nav class="tabs topbar-tabs" aria-label="首页分类" data-home-tabs>
            <button class="tab active" type="button" data-feed-tab="recommend">推荐</button>
            <button class="tab" type="button" data-feed-tab="discover">发现</button>
            <button class="tab" type="button" data-feed-tab="following">关注</button>
          </nav>
          <div class="top-actions">
            <button class="icon-btn" type="button" data-search aria-label="搜索">
              <img class="top-action-img" src="public/assets/pickcat/ic_search.png" alt="" />
            </button>
          </div>
        </header>

        <section class="view active" id="home-view" data-view="home">
          <div class="feed" data-feed></div>
          <div class="feed-sentinel" data-feed-sentinel>继续滑动加载社区内容</div>
        </section>

        <section class="view" id="circle-view" data-view="circle">
          <div class="circle-entry-row" data-circle-shortcuts></div>
          <section class="oldsquaw-zone" data-oldsquaw-zone></section>
          <section class="section-head">
            <h2>官方喵圈</h2>
            <button type="button" class="text-btn">查看更多 &gt;</button>
          </section>
          <div class="circle-grid" data-circles></div>
          <div class="feed compact circle-feed" data-circle-feed></div>
        </section>

        <section class="view" id="publish-view" data-view="publish">
          <div class="composer">
            <h2>发布动态</h2>
            <select class="select-input" data-compose-board aria-label="选择喵圈"></select>
            <input class="title-input" data-compose-title placeholder="标题" />
            <textarea data-compose-body placeholder="分享作品、想法或喵圈内容"></textarea>
            <div class="compose-tools">
              <button type="button" class="chip active">动态</button>
              <button type="button" class="chip">作品</button>
              <button type="button" class="chip">喵圈</button>
              <button type="button" class="chip">控件</button>
              <button type="button" class="chip">扩展</button>
              <button type="button" class="chip">教程</button>
            </div>
            <button type="button" class="primary-btn" data-post>发布</button>
          </div>
        </section>

        <section class="view" id="message-view" data-view="message">
          <div class="empty-state">
            <div class="bubble-mark">...</div>
            <h2>消息</h2>
            <p>回复、点赞、收藏和系统通知会在这里汇总。</p>
          </div>
        </section>

        <section class="view" id="mine-view" data-view="mine">
          <div class="mine-hero">
            <img src="public/assets/bg_mine_header.png" alt="" />
            <button class="icon-btn light" type="button" aria-label="更多">
              <img class="top-action-img menu-img" src="public/assets/pickcat/ic_more_mine_black.png" alt="" />
            </button>
          </div>
          <section class="profile-card">
            <div class="avatar">皮</div>
            <div class="profile-main">
              <h2>未登录</h2>
              <p>Pickcat 复刻计划 · 前端多端原型</p>
            </div>
          </section>
          <nav class="profile-tabs">
            <button class="tab active" type="button">动态</button>
            <button class="tab" type="button">作品</button>
            <button class="tab" type="button">喵圈</button>
          </nav>
          <div class="feed compact" data-mine-feed></div>
        </section>

        <section class="view" id="work-view" data-view="work">
          <article class="work-reader" data-work-reader></article>
        </section>

        <section class="view" id="user-view" data-view="user">
          <article class="user-reader" data-user-reader></article>
        </section>

        <section class="view" id="tool-view" data-view="tool">
          <article class="tool-runner" data-tool-runner></article>
        </section>

        <section class="view" id="login-view" data-view="login">
          <form class="login-panel" data-login-form>
            <h2>PICKCAT</h2>
            <p>使用编程猫社区账号登录</p>
            <label class="login-field">
              <img src="public/assets/pickcat/ic_login_user.png" alt="" />
              <input name="identity" autocomplete="username" placeholder="手机号 / 用户名 / 邮箱" required />
            </label>
            <label class="login-field">
              <img src="public/assets/pickcat/icon_login_password.png" alt="" />
              <input name="password" type="password" autocomplete="current-password" placeholder="密码" required />
            </label>
            <label class="remember-row">
              <input name="remember" type="checkbox" checked />
              <span>保存账号和登录状态</span>
            </label>
            <button class="primary-btn" type="submit">登录</button>
            <div class="api-note" data-login-status>登录接口来自 BCMAPI：tiger/v3/web/accounts/login</div>
          </form>
        </section>

        <section class="view" id="search-view" data-view="search">
          <div class="search-page">
            <label class="search-box">
              <img class="search-box-icon" src="public/assets/pickcat/ic_search_grey.png" alt="" />
              <input data-search-input placeholder="搜点有趣的" />
            </label>
            <button class="text-btn" type="button" data-cancel-search>取消</button>
          </div>
          <section class="search-history">
            <div class="section-head">
              <h2>搜索历史</h2>
              <button type="button" class="text-btn" data-clear-search>清空记录</button>
            </div>
            <div class="chips" data-history></div>
          </section>
          <div class="feed compact" data-search-results></div>
        </section>

        <section class="view" id="detail-view" data-view="detail">
          <article class="detail" data-detail>
            <div class="loading-card">正在读取社区残留内容...</div>
          </article>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="nav-item active" type="button" data-nav="home">
          <img data-icon-normal="public/assets/tab_main_home_normal.png" data-icon-active="public/assets/tab_main_home_selected.png" src="public/assets/tab_main_home_selected.png" alt="" />
          <span>首页</span>
        </button>
        <button class="nav-item" type="button" data-nav="circle">
          <img data-icon-normal="public/assets/tab_main_prefecture_normal.png" data-icon-active="public/assets/tab_main_prefecture_selected.png" src="public/assets/tab_main_prefecture_normal.png" alt="" />
          <span>喵圈</span>
        </button>
        <button class="create-btn" type="button" data-create-open aria-label="发布">
          <img src="public/assets/tab_main_main_create.png" alt="" />
        </button>
        <button class="nav-item" type="button" data-nav="message">
          <img data-icon-normal="public/assets/tab_main_msg_nomal.png" data-icon-active="public/assets/tab_main_msg_selected.png" src="public/assets/tab_main_msg_nomal.png" alt="" />
          <span>消息</span>
        </button>
        <button class="nav-item" type="button" data-nav="mine">
          <img data-icon-normal="public/assets/tab_main_mine_normal.png" data-icon-active="public/assets/tab_main_mine_selected.png" src="public/assets/tab_main_mine_normal.png" alt="" />
          <span>我的</span>
        </button>
      </nav>

      <section class="create-sheet hidden" data-create-sheet aria-hidden="true">
        <button class="sheet-backdrop" type="button" data-create-close aria-label="关闭发布菜单"></button>
        <div class="sheet-panel" role="dialog" aria-label="发布">
          <button class="sheet-close" type="button" data-create-close data-create-close-panel aria-label="关闭">×</button>
          <div class="sheet-handle"></div>
          <section class="sheet-section">
            <h2>创作工具</h2>
            <div class="sheet-grid">
              <a class="sheet-item" href="#tool-nemo" data-open-tool="nemo">
                <img src="public/assets/pickcat/nemo.png" alt="" />
                <span>Nemo</span>
              </a>
              <a class="sheet-item partner-tool" href="#tool-better-nemo" data-open-tool="better-nemo">
                <img src="public/assets/pickcat/nemo.png" alt="" />
                <span>BetterNemo</span>
              </a>
              <a class="sheet-item partner-tool" href="#tool-better-nemo-pc" data-open-tool="better-nemo-pc">
                <img src="public/assets/pickcat/nemo.png" alt="" />
                <span>BetterNemoPC</span>
              </a>
              <a class="sheet-item" href="#tool-kitten" data-open-tool="kitten">
                <img src="public/assets/pickcat/kitten.png" alt="" />
                <span>Kitten</span>
              </a>
              <a class="sheet-item" href="#tool-kn" data-open-tool="kn">
                <img src="public/assets/pickcat/kitten.png" alt="" />
                <span>KittenN</span>
              </a>
              <a class="sheet-item partner-tool" href="#tool-kn-oldsquaw" data-open-tool="kn-oldsquaw">
                <img src="public/assets/pickcat/kitten.png" alt="" />
                <span>KN-Oldsquaw</span>
              </a>
              <a class="sheet-item partner-tool" href="#tool-coco-pro" data-open-tool="coco-pro">
                <img src="public/assets/pickcat/box.png" alt="" />
                <span>CoCo Pro</span>
              </a>
              <a class="sheet-item partner-tool" href="#tool-widget-editor" data-open-tool="widget-editor">
                <span class="sheet-icon-circle"><img src="public/assets/pickcat/ic_photo.png" alt="" /></span>
                <span>控件编辑器</span>
              </a>
              <span class="sheet-item disabled" aria-disabled="true">
                <img src="public/assets/pickcat/turtle.png" alt="" />
                <span>海龟</span>
              </span>
            </div>
          </section>
          <section class="sheet-section">
            <h2>发布动态</h2>
            <div class="sheet-grid publish-grid">
              <a class="sheet-item" href="#publish-text" data-create-publish="text">
                <span class="sheet-icon-circle"><img src="public/assets/pickcat/ic_photo.png" alt="" /></span>
                <span>图文</span>
              </a>
              <a class="sheet-item" href="#publish-video" data-create-publish="video">
                <span class="sheet-icon-circle"><img src="public/assets/pickcat/ic_video.png" alt="" /></span>
                <span>视频</span>
              </a>
            </div>
          </section>
        </div>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
